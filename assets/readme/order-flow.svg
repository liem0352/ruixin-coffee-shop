<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="flowTitle flowDesc">
  <title id="flowTitle">点单流程 - 5 步顾客动线</title>
  <desc id="flowDesc">瑞鑫咖啡店点单流程:选品浏览、规格选择(杯型/温度/甜度)、加入购物袋、提交订单、完成。每步标注路由与动作。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="320" rx="14" fill="#2A1F17"/>

  <!-- Header -->
  <text x="48" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#B8651B">ORDER FLOW</text>
  <text x="48" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#EDE0CC">点单流程 · 顾客动线 5 步</text>

  <!-- 5 step boxes, 200w x 140h, gap 20, padding 48 -->
  <!-- Total: 5*200 + 4*20 = 1080, start at x=60 -->

  <!-- Step 1: 浏览菜单 -->
  <g transform="translate(60 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#B8651B">/caidan</text>
    <text x="14" y="52" font-size="18" font-weight="700" fill="#EDE0CC">浏览菜单</text>
    <line x1="14" y1="64" x2="40" y2="64" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="86" font-size="12" fill="#8B7E72">分类浏览</text>
    <text x="14" y="104" font-size="12" fill="#8B7E72">点击商品卡</text>
    <text x="14" y="122" font-size="12" fill="#8B7E72">查看详情</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <g stroke="#4A3A2A" stroke-width="1" fill="none">
    <line x1="268" y1="170" x2="296" y2="170"/>
    <polyline points="290,164 302,170 290,176"/>
  </g>

  <!-- Step 2: 选规格 (主推 - 主色填充) -->
  <g transform="translate(300 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#B8651B" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#1A1410">SPEC SELECT</text>
    <text x="14" y="52" font-size="18" font-weight="700" fill="#1A1410">选规格</text>
    <line x1="14" y1="64" x2="40" y2="64" stroke="#2A1F17" stroke-width="1"/>
    <text x="14" y="86" font-size="12" fill="#2A1F17">杯型: 中/大/超大</text>
    <text x="14" y="104" font-size="12" fill="#2A1F17">温度: 热/常温/冰</text>
    <text x="14" y="122" font-size="12" fill="#2A1F17">甜度: 无/半/全糖</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <g stroke="#4A3A2A" stroke-width="1" fill="none">
    <line x1="508" y1="170" x2="536" y2="170"/>
    <polyline points="530,164 542,170 530,176"/>
  </g>

  <!-- Step 3: 加入购物袋 -->
  <g transform="translate(540 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#B8651B">ADD TO BAG</text>
    <text x="14" y="52" font-size="18" font-weight="700" fill="#EDE0CC">加入购物袋</text>
    <line x1="14" y1="64" x2="40" y2="64" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="86" font-size="12" fill="#8B7E72">点击加购按钮</text>
    <text x="14" y="104" font-size="12" fill="#8B7E72">数量 +1</text>
    <text x="14" y="122" font-size="12" fill="#8B7E72">小计实时更新</text>
  </g>

  <!-- Arrow 3 -> 4 -->
  <g stroke="#4A3A2A" stroke-width="1" fill="none">
    <line x1="748" y1="170" x2="776" y2="170"/>
    <polyline points="770,164 782,170 770,176"/>
  </g>

  <!-- Step 4: 提交订单 -->
  <g transform="translate(780 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#1A1410" stroke="#4A9B6E" stroke-width="1"/>
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#4A9B6E">/gouwudai</text>
    <text x="14" y="52" font-size="18" font-weight="700" fill="#EDE0CC">提交订单</text>
    <line x1="14" y1="64" x2="40" y2="64" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="86" font-size="12" fill="#8B7E72">调数量 · 算金额</text>
    <text x="14" y="104" font-size="12" fill="#8B7E72">核对购物袋</text>
    <text x="14" y="122" font-size="12" fill="#8B7E72">点下单</text>
  </g>

  <!-- Arrow 4 -> 5 -->
  <g stroke="#4A3A2A" stroke-width="1" fill="none">
    <line x1="988" y1="170" x2="1016" y2="170"/>
    <polyline points="1010,164 1022,170 1010,176"/>
  </g>

  <!-- Step 5: 完成 (松绿强调) -->
  <g transform="translate(1020 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="132" height="140" rx="12" fill="#1A1410" stroke="#4A9B6E" stroke-width="1.5"/>
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#4A9B6E">/wode</text>
    <text x="14" y="52" font-size="18" font-weight="700" fill="#4A9B6E">完成</text>
    <line x1="14" y1="64" x2="40" y2="64" stroke="#4A3A2A" stroke-width="1"/>
    <text x="14" y="86" font-size="12" fill="#8B7E72">订单入库</text>
    <text x="14" y="104" font-size="12" fill="#8B7E72">历史订单</text>
    <text x="14" y="122" font-size="12" fill="#8B7E72">可查看复购</text>
  </g>

  <!-- Footer note -->
  <text x="48" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">选规格为主色填充 (核心交互) · 完成与下单终点为松绿强调 · 路由标注于卡片顶部</text>
</svg>
