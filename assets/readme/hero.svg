<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">瑞鑫咖啡店管理系统 - Vue3 · Vite · Pinia · Vant 4</title>
  <desc id="heroDesc">瑞鑫咖啡店管理系统项目封面。左侧标题块:项目名 Vue3 · Vite · Pinia · Vant 4 移动端;右侧为咖啡杯与三张移动端规格选择卡(杯型/温度/甜度),呼应菜单页核心交互。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="360" rx="26" fill="#2A1F17"/>

  <!-- Top hairline accent -->
  <rect x="56" y="32" width="1088" height="1" fill="#3A2A1F"/>

  <!-- Left: title block -->
  <g transform="translate(56 56)">
    <!-- top mark: brand dot + label -->
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#B8651B"/>
    <text x="20" y="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#B8651B">VUE3 · MOBILE COFFEE</text>

    <!-- project name -->
    <text x="0" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" font-weight="700" fill="#EDE0CC">瑞鑫咖啡店管理系统</text>

    <!-- subtitle -->
    <text x="0" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#8B7E72">Vue3 · Vite · Pinia · Vant 4 · 移动端</text>

    <!-- accent underline -->
    <line x1="0" y1="134" x2="64" y2="134" stroke="#4A9B6E" stroke-width="2"/>

    <!-- meta strip -->
    <text x="0" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">6 视图 · 自定义 TabBar · Sass · Axios</text>

    <!-- bottom author line -->
    <text x="0" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">作者 liem · Vue 3.5 · Vite 6 · MIT</text>
  </g>

  <!-- Right: coffee cup + spec cards composition -->
  <g transform="translate(720 40)">
    <!-- container outline -->
    <rect x="0" y="0" width="424" height="280" rx="14" fill="#1A1410" stroke="#3A2A1F" stroke-width="1"/>

    <!-- label upper-left of container -->
    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">SPEC PANEL · /caidan</text>

    <!-- Left half: simplified coffee cup -->
    <g transform="translate(40 60)">
      <!-- Steam: 3 rising curves -->
      <g fill="none" stroke="#EDE0CC" stroke-width="2" stroke-linecap="round" opacity="0.5">
        <path d="M 30 60 C 24 46, 36 36, 30 22 C 24 8, 36 -2, 30 -14"/>
        <path d="M 50 60 C 44 46, 56 36, 50 22 C 44 8, 56 -2, 50 -14"/>
        <path d="M 70 60 C 64 46, 76 36, 70 22 C 64 8, 76 -2, 70 -14"/>
      </g>

      <!-- Cup body (trapezoid) -->
      <path d="M 8 78 L 92 78 L 82 196 L 18 196 Z" fill="#B8651B" stroke="#4A3A2A" stroke-width="1"/>

      <!-- Cup rim (opening) -->
      <ellipse cx="50" cy="78" rx="42" ry="8" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
      <!-- Coffee surface -->
      <ellipse cx="50" cy="78" rx="38" ry="5" fill="#4A2A1A"/>

      <!-- Cup handle (right side arc) -->
      <path d="M 92 98 C 126 104, 126 170, 82 182" fill="none" stroke="#B8651B" stroke-width="8" stroke-linecap="round"/>
      <path d="M 92 98 C 126 104, 126 170, 82 182" fill="none" stroke="#4A3A2A" stroke-width="1"/>

      <!-- Saucer -->
      <ellipse cx="50" cy="202" rx="56" ry="6" fill="#4A3A2A"/>
    </g>

    <!-- Right half: 3 spec cards stacked -->
    <g transform="translate(160 60)">
      <!-- Card 1: 杯型 -->
      <g>
        <rect x="0" y="0" width="248" height="56" rx="12" fill="#2A1F17" stroke="#4A3A2A" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">杯型</text>
        <!-- 中杯 highlighted -->
        <rect x="8" y="30" width="38" height="18" rx="9" fill="#B8651B"/>
        <text x="14" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#1A1410">中杯</text>
        <text x="52" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <text x="62" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">大杯</text>
        <text x="96" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <text x="106" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">超大杯</text>
      </g>

      <!-- Card 2: 温度 -->
      <g transform="translate(0 68)">
        <rect x="0" y="0" width="248" height="56" rx="12" fill="#2A1F17" stroke="#4A3A2A" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">温度</text>
        <!-- 热 highlighted -->
        <rect x="8" y="30" width="26" height="18" rx="9" fill="#B8651B"/>
        <text x="13" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#1A1410">热</text>
        <text x="40" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <text x="50" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">常温</text>
        <text x="86" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <text x="96" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">冰</text>
      </g>

      <!-- Card 3: 甜度 -->
      <g transform="translate(0 136)">
        <rect x="0" y="0" width="248" height="56" rx="12" fill="#2A1F17" stroke="#4A3A2A" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">甜度</text>
        <text x="12" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">无糖</text>
        <text x="46" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <!-- 半糖 highlighted green -->
        <rect x="54" y="30" width="38" height="18" rx="9" fill="#4A9B6E"/>
        <text x="60" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#1A1410">半糖</text>
        <text x="98" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">/</text>
        <text x="108" y="43" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#EDE0CC">全糖</text>
      </g>
    </g>
  </g>
</svg>
