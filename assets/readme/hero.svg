<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">瑞鑫咖啡店管理系统 — Vue3 · Vite · Pinia · Vant 4</title>
  <desc id="heroDesc">瑞鑫咖啡店管理系统项目封面。左侧标题块:项目名与技术栈 Vue3 · Vite · Pinia · Vant 4 · 移动端;右侧为咖啡杯与三张移动端规格选择卡(杯型/温度/甜度),呼应菜单页核心交互。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="360" rx="26" fill="#2A1F17"/>

  <!-- Left: title block -->
  <g transform="translate(56 40)">
    <text x="0" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" letter-spacing="2" fill="#B8651B">VUE3 · MOBILE COFFEE</text>
    <text x="0" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="44" font-weight="700" fill="#EDE0CC">瑞鑫咖啡店管理系统</text>
    <text x="0" y="114" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#8B7E72">Vue3 · Vite · Pinia · Vant 4 · 移动端</text>
    <text x="0" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">6 视图 · 自定义 TabBar · Sass</text>
    <line x1="0" y1="178" x2="64" y2="178" stroke="#4A9B6E" stroke-width="2"/>
  </g>

  <!-- Right: coffee cup + spec cards -->
  <g transform="translate(720 40)">
    <!-- container outline -->
    <rect x="0" y="0" width="424" height="280" rx="14" fill="none" stroke="#3A2A1F" stroke-width="1"/>

    <!-- Left half: simplified coffee cup -->
    <g transform="translate(0 20)">
      <!-- Steam: 3 rising curves -->
      <g fill="none" stroke="#EDE0CC" stroke-width="2" stroke-linecap="round" opacity="0.55">
        <path d="M 50 78 C 44 64, 56 54, 50 40 C 44 26, 56 16, 50 4"/>
        <path d="M 70 78 C 64 64, 76 54, 70 40 C 64 26, 76 16, 70 4"/>
        <path d="M 90 78 C 84 64, 96 54, 90 40 C 84 26, 96 16, 90 4"/>
      </g>

      <!-- Cup body (trapezoid) -->
      <path d="M 28 92 L 112 92 L 102 210 L 38 210 Z" fill="#B8651B" stroke="#4A3A2A" stroke-width="1"/>

      <!-- Cup rim (opening) -->
      <ellipse cx="70" cy="92" rx="42" ry="8" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
      <!-- Coffee surface -->
      <ellipse cx="70" cy="92" rx="38" ry="5" fill="#4A2A1A"/>

      <!-- Cup handle (right side arc) -->
      <path d="M 112 112 C 146 118, 146 184, 102 196" fill="none" stroke="#B8651B" stroke-width="8" stroke-linecap="round"/>
      <path d="M 112 112 C 146 118, 146 184, 102 196" fill="none" stroke="#4A3A2A" stroke-width="1"/>

      <!-- Saucer -->
      <ellipse cx="70" cy="216" rx="56" ry="6" fill="#4A3A2A"/>
    </g>

    <!-- Right half: 3 spec cards stacked -->
    <g transform="translate(160 20)">
      <!-- Card 1: 杯型 -->
      <g>
        <rect x="0" y="0" width="264" height="68" rx="14" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
        <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1" fill="#8B7E72">杯型</text>
        <!-- 中杯 highlighted -->
        <rect x="8" y="36" width="40" height="22" rx="11" fill="#B8651B"/>
        <text x="16" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#1A1410">中杯</text>
        <text x="56" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <text x="70" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">大杯</text>
        <text x="104" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <text x="118" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">超大杯</text>
      </g>

      <!-- Card 2: 温度 -->
      <g transform="translate(0 80)">
        <rect x="0" y="0" width="264" height="68" rx="14" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
        <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1" fill="#8B7E72">温度</text>
        <!-- 热 highlighted -->
        <rect x="8" y="36" width="28" height="22" rx="11" fill="#B8651B"/>
        <text x="15" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#1A1410">热</text>
        <text x="44" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <text x="58" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">常温</text>
        <text x="92" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <text x="106" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">冰</text>
      </g>

      <!-- Card 3: 甜度 -->
      <g transform="translate(0 160)">
        <rect x="0" y="0" width="264" height="68" rx="14" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
        <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1" fill="#8B7E72">甜度</text>
        <text x="14" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">无糖</text>
        <text x="50" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <!-- 半糖 highlighted green -->
        <rect x="60" y="36" width="40" height="22" rx="11" fill="#4A9B6E"/>
        <text x="68" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#1A1410">半糖</text>
        <text x="110" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7E72">/</text>
        <text x="124" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#EDE0CC">全糖</text>
      </g>
    </g>
  </g>

  <!-- Footer mono -->
  <text x="56" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B7E72">作者 liem · Vue 3.5 · Vite 6 · MIT</text>
</svg>
