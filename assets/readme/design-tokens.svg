<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%" role="img" aria-labelledby="tokensTitle tokensDesc">
  <title id="tokensTitle">设计令牌 - 颜色 / 字号 / 圆角</title>
  <desc id="tokensDesc">瑞鑫咖啡店管理系统设计令牌:品牌色(瑞幸蓝 + 咖啡棕 + 松绿 + 暖白 + 中性灰棕)、字号阶梯(48 / 22 / 18 / 14 / 12)、圆角阶梯(26 / 14 / 12 / 10 / 9)。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="240" rx="14" fill="#2A1F17"/>

  <!-- Header -->
  <text x="48" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#B8651B">DESIGN TOKENS</text>
  <text x="48" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#EDE0CC">颜色 · 字号 · 圆角</text>

  <!-- Section A: Color tokens -->
  <text x="48" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">COLOR</text>

  <!-- Color swatches: 6 colors, 80w each, gap 8, start x=48 -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- 1. 瑞幸蓝 (brand) -->
    <g transform="translate(48 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#0066B3"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">brand</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#0066B3</text>
    </g>

    <!-- 2. 咖啡棕 (primary) -->
    <g transform="translate(136 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#B8651B"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">primary</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#B8651B</text>
    </g>

    <!-- 3. 松绿 (accent) -->
    <g transform="translate(224 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#4A9B6E"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">accent</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#4A9B6E</text>
    </g>

    <!-- 4. 暖白 (fg) -->
    <g transform="translate(312 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#EDE0CC" stroke="#4A3A2A" stroke-width="1"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">fg</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#EDE0CC</text>
    </g>

    <!-- 5. 中性灰棕 (muted) -->
    <g transform="translate(400 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#8B7E72"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">muted</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#8B7E72</text>
    </g>

    <!-- 6. 画布背景 (canvas) -->
    <g transform="translate(488 100)">
      <rect x="0" y="0" width="80" height="56" rx="10" fill="#2A1F17" stroke="#4A3A2A" stroke-width="1"/>
      <text x="6" y="76" font-size="11" fill="#EDE0CC">canvas</text>
      <text x="6" y="90" font-size="10" fill="#8B7E72">#2A1F17</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="600" y1="100" x2="600" y2="190" stroke="#3A2A1F" stroke-width="1"/>

  <!-- Section B: Type scale -->
  <text x="640" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">TYPE SCALE</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="640" y="124" font-size="36" font-weight="700" fill="#EDE0CC">Aa</text>
    <text x="704" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">36 · hero</text>

    <text x="640" y="156" font-size="22" font-weight="700" fill="#EDE0CC">Aa</text>
    <text x="688" y="156" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">22 · section</text>

    <text x="640" y="184" font-size="18" fill="#EDE0CC">Aa</text>
    <text x="680" y="184" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">18 · sub</text>

    <text x="800" y="124" font-size="14" fill="#EDE0CC">Aa</text>
    <text x="832" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">14 · body</text>

    <text x="800" y="156" font-size="12" fill="#8B7E72">Aa</text>
    <text x="832" y="156" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">12 · meta</text>
  </g>

  <!-- Divider -->
  <line x1="960" y1="100" x2="960" y2="190" stroke="#3A2A1F" stroke-width="1"/>

  <!-- Section C: Radius scale -->
  <text x="984" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#8B7E72">RADIUS</text>

  <g>
    <!-- 26 canvas -->
    <rect x="984" y="104" width="36" height="36" rx="26" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
    <text x="1028" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">26 canvas</text>

    <!-- 14 card -->
    <rect x="984" y="146" width="36" height="36" rx="14" fill="#1A1410" stroke="#4A3A2A" stroke-width="1"/>
    <text x="1028" y="166" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">14 card</text>

    <!-- 9 pill -->
    <rect x="1116" y="104" width="36" height="36" rx="18" fill="#B8651B"/>
    <text x="1116" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">9 pill</text>
  </g>

  <!-- Footer note -->
  <text x="48" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B7E72">brand 仅供品牌识别使用 · 主色为 primary · accent 用于强调态</text>
</svg>
